name: Build Firmware

on:
  workflow_dispatch:
    inputs:
      ssh:
        description: 'SSH connection to Actions'
        required: false
        default: 'false'

env:
  REPO_URL: https://github.com/LiBwrt/openwrt-6.x
  REPO_BRANCH: v25.12.0
  FEEDS_CONF: feeds.conf.default
  DEVICE_NAME: yasuo
  CONFIG_FILE: config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  UPLOAD_BIN_DIR: false
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: false
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install $(cat ${GITHUB_WORKSPACE}/depends-ubuntu-2004)
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"

    - name: Clone source code
      run: |
        df -hT $PWD
        git clone $REPO_URL -b $REPO_BRANCH ${GITHUB_WORKSPACE}/openwrt

    - name: Cache dl
      uses: actions/cache@v5
      with:
         path: openwrt/dl
         key: dl-${{ env.DEVICE_NAME }}-${{ hashFiles('feeds.conf.default', env.CONFIG_FILE) }}
         restore-keys: |
           dl-${{ env.DEVICE_NAME }}-

    - name: Load custom feeds
      run: |
        [ -e $FEEDS_CONF ] && cp $FEEDS_CONF ${GITHUB_WORKSPACE}/openwrt/feeds.conf.default
        cp ${GITHUB_WORKSPACE}/$DIY_P1_SH ${GITHUB_WORKSPACE}/$DIY_P2_SH ${GITHUB_WORKSPACE}/openwrt/
        cd ${GITHUB_WORKSPACE}/openwrt
        chmod a+x $DIY_P1_SH $DIY_P2_SH
        ./$DIY_P1_SH
        ./scripts/feeds update -a
        ./$DIY_P2_SH
        ./scripts/feeds install -a

    - name: Cache ccache
      uses: actions/cache@v5
      with:
        path: ~/.ccache
        key: ccache-${{ runner.os }}-${{ env.DEVICE_NAME }}-${{ hashFiles(env.CONFIG_FILE) }}

    - name: Download package
      id: package
      run: |
        cd ${GITHUB_WORKSPACE}/openwrt
        cp -f ${GITHUB_WORKSPACE}/$CONFIG_FILE ${GITHUB_WORKSPACE}/openwrt/.config
        make defconfig
        make download -j8 || make download -j1 V=s

    - name: Compile the firmware
      id: compile
      run: |
        cd ${GITHUB_WORKSPACE}/openwrt
        make -j$(nproc) || make -j1 V=s
        echo "status=success" >> "$GITHUB_OUTPUT"
        grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
        [ -s DEVICE_NAME ] && echo "DEVICE_NAME=_$(cat DEVICE_NAME)" >> $GITHUB_ENV
        echo "FILE_DATE=_$(date +"%Y%m%d%H%M%S")" >> $GITHUB_ENV

    - name: Check space usage
      if: (!cancelled())
      run: df -hT

    - name: Zip bin directory
      if: env.UPLOAD_BIN_DIR == 'true' && steps.compile.outputs.status == 'success' && !cancelled()
      run: |
        cd ${GITHUB_WORKSPACE}/openwrt/bin
        zip -r ${GITHUB_WORKSPACE}/openwrt/openwrt_bin${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}.zip *

    - name: Organize files
      id: organize
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_FIRMWARE == 'true' && !cancelled()
      run: |
        cd ${GITHUB_WORKSPACE}/openwrt/bin/targets/*/*
        rm -rf packages
          if [ "$UPLOAD_BIN_DIR" = "true" ]; then
            mv ${GITHUB_WORKSPACE}/openwrt/openwrt_bin${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}.zip ./
          fi
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "status=success" >> "$GITHUB_OUTPUT"

    - name: Upload firmware directory
      uses: actions/upload-artifact@v7
      if: steps.organize.outputs.status == 'success' && !cancelled()
      with:
        name: openwrt_firmware${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: ${{ env.FIRMWARE }}

    - name: Generate release tag
      id: tag
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_RELEASE == 'true' && !cancelled()
      run: |
        ls ${{ env.FIRMWARE }}
        echo "release_tag=$(date +"%Y.%m.%d-%H%M%S")" >> "$GITHUB_OUTPUT"
        echo "status=success" >> "$GITHUB_OUTPUT"

    - name: Generate release info
      id: info
      if: steps.tag.outputs.status == 'success' && !cancelled()
      run: |
        echo "## :mega:Update content" > release.txt
        echo "![](https://img.shields.io/github/downloads/${{ github.repository }}/${{ steps.tag.outputs.release_tag }}/total?style=flat-square)" >> release.txt
        echo "### Info" >> release.txt
        echo "**:minidisc: Build Time: ${{ steps.tag.outputs.release_tag }}**" >> release.txt
        touch release.txt
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Upload firmware to release
      uses: ncipollo/release-action@v1
      if: steps.info.outputs.status == 'success' && !cancelled()
      with:
        tag: ${{ steps.tag.outputs.release_tag }}
        bodyFile: release.txt
        artifacts: ${{ env.FIRMWARE }}/*

    - name: Delete workflow runs
      uses: Mattraks/delete-workflow-runs@v2
      with:
        retain_days: 0
        keep_minimum_runs: 1

    - name: Delete old releases
      if: env.UPLOAD_RELEASE == 'true' && !cancelled()
      uses: actions/github-script@v9
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: |
          const keepLatest = 12;
          const deleteTags = true;
          const { data: releases } = await github.rest.repos.listReleases({
            owner: context.repo.owner,
            repo: context.repo.repo,
          });
          const sorted = releases.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
          const toDelete = sorted.slice(keepLatest);
          for (const release of toDelete) {
            console.log(`Deleting release: ${release.tag_name}`);
            await github.rest.repos.deleteRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release.id,
            });
            if (deleteTags) {
              try {
                await github.rest.git.deleteRef({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ref: `tags/${release.tag_name}`,
                });
                console.log(`Deleted tag: ${release.tag_name}`);
              } catch (err) {
                console.log(`Failed to delete tag ${release.tag_name}: ${err.message}`);
              }
            }
          }
